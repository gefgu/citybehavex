tessellation:
  min_lon: 120.8
  min_lat: 30.7
  max_lon: 122.1
  max_lat: 31.9
  resolution: 8
  enrich_overture: true
  overture_release: "2026-05-20.0"
  min_poi_count: 1
  output: data/shanghai/shanghai_h3_tessellation.parquet

simulation:
  agents: 58501
  # agents: 500
  days: 10
  start_date: "2015-12-27"
  output: data/shanghai/results/shanghai_simulation_trajectories.parquet
  random_state: 42
  relevance_column: relevance
  granularity_minutes: 60
  car_speed_kmh: 35.0        # fallback speed when road routing is disabled/unsnapped
  social_graph_k: 20
  profile_graph_exact_threshold: 10000
  rho: 0.6
  gamma: 0.21
  alpha: 0.2
  dt_update_mob_sim_hours: 168.0
  indipendency_window_hours: 0.5
  gravity_deterrence_exponent: -2.0
  gravity_origin_exponent: 1.0
  gravity_destination_exponent: 1.0

road_network:
  enabled: true
  nodes_output: data/shanghai/shanghai_road_graph_nodes.parquet
  edges_output: data/shanghai/shanghai_road_graph_edges.parquet
  snap_output: data/shanghai/shanghai_road_graph_snap.parquet

llm:
  base_url: "http://localhost:8081"
  api_key: "none"
  model: "Qwen/Qwen2.5-32B-Instruct-AWQ"
  diary_count: 30
  max_tokens: 768
  cache_dir: data/llm_diaries_shanghai
  validated_diaries_path: data/llm_diaries_shanghai/validated_diaries.json

diaries:
  city_profile: "Shanghai, China — one of the world's densest megacities, with extensive metro and bus networks, high-rise residential clusters, commercial districts, industrial zones, and mixed-use neighborhoods."
  city_profile_weekday: "Shanghai weekday routines: early metro/bus commutes to offices, factories, or universities; midday meals near workplaces; evening shopping or leisure along commercial streets; late returns home."
  city_profile_weekend: "Shanghai weekend routines: later mornings at home, family outings to malls, parks, or restaurants, leisure trips by metro or car, tourism in central districts."
  representative_day: "2015-12-27"
  location_count_mu: 1.0
  location_count_sigma: 0.5
  max_locations: 6
  motif_exploration_rate: 0.5

embedding:
  enabled: true 
  model: "nomic-ai/nomic-embed-text-v1.5"
  base_url: "http://localhost:8001"
  task_prefix: "clustering: "
  dimensions: 768
  auto_launch: true
  vllm_executable: /home/gustavo/vllm/.venv/bin/vllm
  vllm_port: 8001
  vllm_extra_args: ["--gpu-memory-utilization", "0.08", "--enforce-eager", "--max-model-len", "512"]
  cache_dir: data/llm_diaries_shanghai
  cache_path: data/llm_diaries_shanghai/diary_embeddings.npz

schedule:
  temperature_beta_a: 2.0
  temperature_beta_b: 5.0
  alpha_beta_a: 2.0
  alpha_beta_b: 5.0
  similarity_backend: alignment_model
  alignment_base_url: http://localhost:8082
  alignment_model: models/modernbert-schedule-aligner
  alignment_cache_path: data/llm_diaries_shanghai/alignment_cache.npz

activities:
  enabled: true
  kappa: 1.0
  temperature: 0.5
  embed_activities: false

profiles:
  enabled: true
  output: data/shanghai/shanghai_agent_profiles.parquet
  overture_feature_h3_resolution: 9
  overture_building_features_output: data/shanghai/shanghai_overture_buildings_h3r9.parquet
  home_building_weight: 1.0
  home_poi_inverse_weight: 0.5
  work_building_weight: 1.0
  work_poi_weight: 0.75
  work_distance_model: exponential
  work_distance_exponential_lambda: 0.3
  work_distance_max_km: 60.0
  work_distance_min_km: 0.25
  work_distance_fallback: expand
  work_distance_density_correction_power: 1.0
  work_from_home_probability: 0.05

comparison:
  path: data/shanghai/shanghai_data_raw.parquet
  label: shanghai
  # WIP: road-network-based jump_lengths/radius_of_gyration is implemented
  # (citybehavex/metrics/road_distance.py) but disabled by default pending
  # further performance validation on large real datasets. Set true to use
  # road-network distance instead of straight-line Haversine.
  road_network_distance: false

name: Static Web Demo Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/frontend/**"
      - "web/demo_export.yaml"
      - "scripts/export_static_web_demo.py"
      - ".github/workflows/static-demo-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci
      - name: Build static demo
        working-directory: web/frontend
        env:
          VITE_STATIC_DEMO: "true"
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/"
          VITE_MAPBOX_TOKEN: ${{ vars.VITE_MAPBOX_TOKEN || secrets.VITE_MAPBOX_TOKEN }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
